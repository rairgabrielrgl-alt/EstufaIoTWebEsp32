<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Estufa IoT</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:#fff;font-family:Arial,sans-serif}
header{padding:20px;text-align:center;font-size:28px;font-weight:bold}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;padding:15px}
.card{background:#1e293b;border-radius:15px;padding:18px;text-align:center;transition:.25s;box-shadow:0 6px 18px rgba(0,0,0,.3)}
.card:hover{transform:translateY(-5px)}
.valor{font-size:34px;font-weight:bold;margin:8px 0}
.status{font-size:20px}
.grafico{background:#1e293b;margin:15px;border-radius:15px;padding:15px}
canvas{height:320px!important}
</style>
</head>
<body>

<header>🌱 Estufa IoT</header>

<div class="cards">
<div class="card"><h3>🌡️ Temp. Interna</h3><div class="valor" id="tempInt">--</div></div>
<div class="card"><h3>🌡️ Temp. Externa</h3><div class="valor" id="tempExt">--</div></div>
<div class="card"><h3>💧 Umid. Interna</h3><div class="valor" id="umiInt">--</div></div>
<div class="card"><h3>💧 Umid. Externa</h3><div class="valor" id="umiExt">--</div></div>
<div class="card"><h3>🌀 Refrigeração</h3><div class="status" id="vent">--</div></div>
<div class="card"><h3>💦 Umidificador</h3><div class="status" id="umid">--</div></div>
<div class="card"><h3>💡 Lampada</h3><div class="status" id="lamp">--</div></div>
</div>

<div class="grafico">
<h2>Temperatura</h2>
<canvas id="grafTemp"></canvas>
</div>

<div class="grafico">
<h2>Umidade</h2>
<canvas id="grafUmid"></canvas>
</div>

<script>
let grafTemp,grafUmid;

function novoGrafico(id,l1,l2,c1,c2){
 return new Chart(document.getElementById(id),{
 type:'line',
 data:{labels:[],datasets:[
 {label:l1,data:[],borderColor:c1,borderWidth:3,tension:.4,fill:false,
 pointRadius:(ctx)=>ctx.dataIndex===ctx.dataset.data.length-1?5:0,
 pointHoverRadius:7},
 {label:l2,data:[],borderColor:c2,borderWidth:3,tension:.4,fill:false,
 pointRadius:(ctx)=>ctx.dataIndex===ctx.dataset.data.length-1?5:0,
 pointHoverRadius:7}
 ]},
 options:{
 responsive:true,
 animation:{duration:700,easing:'easeOutQuart'},
 plugins:{legend:{labels:{color:'white'}}},
 scales:{
 x:{ticks:{color:'white'}},
 y:{ticks:{color:'white'},grace:'5%'}
 }
 }
 });
}

grafTemp=novoGrafico("grafTemp","Interna","Externa","#ef4444","#f59e0b");
grafUmid=novoGrafico("grafUmid","Interna","Externa","#3b82f6","#22c55e");

async function atualizar(){
 const r=await fetch('/monitoramento/api/?t='+Date.now());
 const dados=await r.json();
 if(!dados.length)return;

 const ultimos=dados.slice(-30);

 const labels=[],ti=[],te=[],ui=[],ue=[];

 ultimos.forEach(i=>{
 labels.push(new Date(i.data).toLocaleTimeString());
 ti.push(i.temperatura_interna);
 te.push(i.temperatura_externa);
 ui.push(i.umidade_interna);
 ue.push(i.umidade_externa);
 });

 const u=ultimos[ultimos.length-1];

 tempInt.innerHTML=u.temperatura_interna.toFixed(1)+'°C';
 tempExt.innerHTML=u.temperatura_externa.toFixed(1)+'°C';
 umiInt.innerHTML=u.umidade_interna.toFixed(1)+'%';
 umiExt.innerHTML=u.umidade_externa.toFixed(1)+'%';
 lamp.innerHTML=u.lampada?'🟢 Ligada':'🔴 Desligada';

 vent.innerHTML=u.ventoinha?'🟢 Ligada':'🔴 Desligada';
 umid.innerHTML=u.umidificador?'🟢 Ligado':'🔴 Desligado';
 lamp.innerHTML=u.lampada?'🟢 Ligada':'🔴 Desligada';

 grafTemp.data.labels=labels;
 grafTemp.data.datasets[0].data=ti;
 grafTemp.data.datasets[1].data=te;
 grafTemp.update();

 grafUmid.data.labels=labels;
 grafUmid.data.datasets[0].data=ui;
 grafUmid.data.datasets[1].data=ue;
 grafUmid.update();
}
setInterval(atualizar,3000);
atualizar();
</script>

</body>
</html>
