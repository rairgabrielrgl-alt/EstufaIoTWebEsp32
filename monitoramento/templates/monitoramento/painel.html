<!DOCTYPE html>
<html>
<head>
    <title>Painel Estufa</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 { margin: 10px; font-size: 20px; }

        .container {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            width: 160px;
        }

        .valor {
            font-size: 24px;
            font-weight: bold;
        }

        .grafico-container {
            width: 95%;
            max-width: 700px;
            height: 300px;
            margin: 15px auto;
        }
    </style>
</head>

<body>

<h1>🌡️ Painel da Estufa</h1>

<div class="container">

    <div class="card">
        <h3>Temp Interna</h3>
        <div class="valor" id="tempInt">--</div> °C
    </div>

    <div class="card">
        <h3>Umid Interna</h3>
        <div class="valor" id="umidInt">--</div> %
    </div>

    <div class="card">
        <h3>Temp Externa</h3>
        <div class="valor" id="tempExt">--</div> °C
    </div>

    <div class="card">
        <h3>Umid Externa</h3>
        <div class="valor" id="umidExt">--</div> %
    </div>

</div>

<div class="grafico-container">
    <canvas id="grafico"></canvas>
</div>

<div class="container">

    <div class="card">
        <h3>Ventoinha</h3>
        <div id="vent">--</div>
    </div>

    <div class="card">
        <h3>Umidificador</h3>
        <div id="umid">--</div>
    </div>

</div>

<script>

let chart;

function criarGrafico(labels, tInt, uInt, tExt, uExt) {

    const ctx = document.getElementById('grafico').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',

        data: {
            labels: labels,

            datasets: [
                {
                    label: 'Temp Interna',
                    data: tInt,
                    borderColor: '#ef4444',
                    tension: 0.4,
                    fill: false
                },
                {
                    label: 'Temp Externa',
                    data: tExt,
                    borderColor: '#f97316',
                    tension: 0.4,
                    fill: false
                },
                {
                    label: 'Umid Interna',
                    data: uInt,
                    borderColor: '#3b82f6',
                    tension: 0.4,
                    fill: false
                },
                {
                    label: 'Umid Externa',
                    data: uExt,
                    borderColor: '#22c55e',
                    tension: 0.4,
                    fill: false
                }
            ]
        },

        options: {
            responsive: true,
            maintainAspectRatio: false,

            plugins: {
                legend: { labels: { color: "white" } }
            },

            scales: {
                x: { ticks: { color: "white" } },
                y: { ticks: { color: "white" } }
            }
        }
    });
}

function atualizar() {

    fetch('/monitoramento/api/?t=' + new Date().getTime())

    .then(r => r.json())
    .then(data => {

        if (!data.length) return;

        let labels = [];
        let tInt = [];
        let uInt = [];
        let tExt = [];
        let uExt = [];

        data.forEach(item => {

            let hora = new Date(item.data).toLocaleTimeString();

            labels.push(hora);

            tInt.push(item.temperatura_interna);
            uInt.push(item.umidade_interna);

            tExt.push(item.temperatura_externa);
            uExt.push(item.umidade_externa);
        });

        let last = data[data.length - 1];

        document.getElementById("tempInt").innerText = last.temperatura_interna.toFixed(1);
        document.getElementById("umidInt").innerText = last.umidade_interna.toFixed(1);

        document.getElementById("tempExt").innerText = last.temperatura_externa.toFixed(1);
        document.getElementById("umidExt").innerText = last.umidade_externa.toFixed(1);

        document.getElementById("vent").innerText =
            last.ventoinha ? "🟢 ON" : "🔴 OFF";

        document.getElementById("umid").innerText =
            last.umidificador ? "🟢 ON" : "🔴 OFF";

        if (!chart) {
            criarGrafico(labels, tInt, uInt, tExt, uExt);
        } else {
            chart.data.labels = labels;

            chart.data.datasets[0].data = tInt;
            chart.data.datasets[1].data = tExt;
            chart.data.datasets[2].data = uInt;
            chart.data.datasets[3].data = uExt;

            chart.update();
        }
    });
}

setInterval(atualizar, 3000);
atualizar();

</script>

</body>
</html>
